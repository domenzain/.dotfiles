# Common split-horizon DNS policy. The setup helper prepends host-specific
# interface directives before installing this as /etc/dnsmasq-lan.conf.
port=53
user=nobody
group=nogroup

# This namespace is authoritative here and must never leak upstream.
local=/lan.domenza.in/
no-hosts
addn-hosts=/etc/dnsmasq-lan.hosts
local-ttl=60
neg-ttl=60

# Forward every other query to the configured LAN resolver. Do not use
# resolv.conf:
# LAN clients may themselves receive this resolver through DHCP.
no-resolv
domain-needed
bogus-priv
cache-size=1000
log-async=25
